name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun i --frozen-lockfile
      - run: bun run lint

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}
      - run: bun i --frozen-lockfile
      - run: bun run typecheck

  build-cli:
    needs: [lint, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}
      - run: bun i --frozen-lockfile
      - run: bun run build

  verify-nextjs-base:
    needs: [build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}
      - run: bun i --frozen-lockfile
      - run: bun run build
      - name: CLI help works
        run: node cli/dist/index.js --help
      - name: Verify nextjs/base scaffold contract
        run: bun run verify:nextjs-base

  verify-nextjs-dev-tooling:
    needs: [build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}
      - run: bun i --frozen-lockfile
      - run: bun run build
      - name: Verify nextjs/base + dev-tooling scaffold contract
        run: bun run verify:nextjs-dev-tooling

  verify-nextjs-github-workflows:
