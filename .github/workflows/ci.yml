        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}
      - run: bun i --frozen-lockfile
      - run: bun run build
      - name: Verify nextjs/base + dev-tooling + github-workflows scaffold contract
        run: bun run verify:nextjs-dev-tooling-github-workflows

  verify-nextjs-ds-workflow-dev-tooling:
